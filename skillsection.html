<html>
<head>
    <title>My Tech Stack</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 25px;
        }

        /* Top Navigation Filter Bar */
        nav {
            background-color: darkgray;
            display: inline-flex;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 40px;
        }

        nav a {
            color: lightgray;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
        }

        /* Active Light Blue Tab */
        nav .active {
            background-color: lightskyblue;
            color: black;
            font-weight: bold;
        }

        /* Grid Setup for 5 Columns */
        section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Individual Tech Card Box */
        div {
            background-color: whitesmoke;
            color: black;
            width: 180px;
            height: 150px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* Big Bold Tech Icon Text Placeholder */
        div h2 {
            margin: 0;
            font-size: 36px;
            color: darkgoldenrod;
        }

        /* Tech Name Text underneath */
        div p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>

    <h1>My Tech Stack</h1>

    <nav>
        <a href="#" class="active">All (25)</a>
        <a href="#">Languages (7)</a>
        <a href="#">Tools (8)</a>
        <a href="#">Libraries (5)</a>
        <a href="#">Databases (4)</a>
    </nav>

    <section>

        <div>
            <h2>C</h2>

        </div>

        <div>
            <h2>C+</h2>
            <p>C++</p>
        </div>

        <div>
            <h2>Py</h2>
            <p>Python</p>
        </div>

        <div>
            <h2>Jy</h2>
            <p>Java</p>
        </div>

        <div>
            <h2>H5</h2>
            <p>HTML</p>
        </div>

        <div>
            <h2>C3</h2>

        </div>

        <div>
            <h2>Np</h2>
            <p>Numpy</p>
        </div>

        <div>

</body>
