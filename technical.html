<!DOCTYPE html>
<html lang="en">

<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Technical Skills</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: gold;
            font-size: 35px;
            margin-bottom: 5px;
        }

        p {
            color: lightgray;
            margin-bottom: 40px;
        }

        section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        div {
            background-color: white;
            color: black;
            width: 400px;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
        }

        div h3 {
            margin-top: 0;
            font-size: 20px;
            color: black;
        }

        div span {
            background-color: #fff8e7;
            color: #b8860b;
            padding: 6px 15px;
            border-radius: 20px;
            margin-right: 5px;
            margin-bottom: 8px;
            display: inline-block;
            font-size: 14px;
        }
    </style>
</head>
<body>
<h1>Technical Skills</h1>
    <p>Technologies and tools I use to design and develop modern web solutions</p>
<section>
            <div>
            <h3>Frontend</h3>
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>React</span>
        </div>
<div>
            <h3>Backend</h3>
            <span>Node.js</span>
            <span>Python</span>
            <span>Java</span>
        </div>
        <div>
            <h3>Design Tools</h3>
            <span>Figma</span>
            <span>Photoshop</span>
            <span>Canva</span>
        </div>
        <div>
            <h3>Dev Tools</h3>
            <span>Git</span>
            <span>GitHub</span>
            <span>VS Code</span>
        </div>
 </section>
</body>
</html>
