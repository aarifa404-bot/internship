<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row row-cols-1 row-cols-lg-3 align-items-stretch g-4">
            <div class="col">
                <div class="card card-cover h-100 p-5 text-white bg-dark rounded-4 shadow-lg" style="background-image: url('https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?w=500'); background-size: cover; min-height: 400px;">
                    <div class="d-flex flex-column h-100 justify-content-end pt-5">
                        <h2 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Short title, long jacket</h2>
                        <ul class="d-flex list-unstyled mt-auto mb-0"><li class="me-auto">🌐 Earth</li><li>3d</li></ul>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card card-cover h-100 p-5 text-white bg-dark rounded-4 shadow-lg" style="background-image: url('https://images.unsplash.com/photo-1561181286-d3fee7d55364?w=500'); background-size: cover; min-height: 400px;">
                    <div class="d-flex flex-column h-100 justify-content-end pt-5">
                        <h2 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Much longer title that wraps to multiple lines</h2>
                        <ul class="d-flex list-unstyled mt-auto mb-0"><li class="me-auto">📍 Pakistan</li><li>4d</li></ul>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card card-cover h-100 p-5 text-white bg-primary rounded-4 shadow-lg" style="background-image: url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=500'); background-size: cover; min-height: 400px;">
                    <div class="d-flex flex-column h-100 justify-content-end pt-5">
                        <h2 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Another longer title belongs here</h2>
                        <ul class="d-flex list-unstyled mt-auto mb-0"><li class="me-auto">🇺🇸 California</li><li>5d</li></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
